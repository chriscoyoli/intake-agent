<svg viewBox="0 0 1000 668" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technical architecture and data flow" font-family="Inter, system-ui, Arial, sans-serif">
  <defs>
    <marker id="d" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#33302f"/></marker>
    <marker id="ds" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#33302f"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#E71B3D"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9a9594"/></marker>
    <style>
      .t{font-size:20px;font-weight:600;fill:#161311;letter-spacing:-0.4px;}
      .sub{font-size:12.5px;fill:#5f5b5c;}
      .bt{font-size:12.5px;font-weight:600;fill:#161311;}
      .bs{font-size:10.5px;fill:#5f5b5c;}
      .mono{font-family:Menlo,Consolas,monospace;}
      .lbl{font-size:10px;fill:#33302f;}
      .rlbl{font-size:10px;fill:#E71B3D;font-weight:600;}
      .badge{fill:#161311;}
      .bnum{font-size:10px;font-weight:700;fill:#fff;}
      .zone{font-size:11px;font-weight:700;fill:#E71B3D;letter-spacing:.6px;}
      .box{fill:#fff;stroke:#d2cfcf;stroke-width:1.4;}
    </style>
  </defs>

  <rect x="0" y="0" width="1000" height="668" fill="#ffffff"/>
  <text class="t" x="22" y="30">Technical architecture and data flow</text>
  <text class="sub" x="22" y="50">One always-on process on Fly.io. Solid arrows = a request being filed; dashed red = the background status loop.</text>

  <rect x="348" y="76" width="346" height="528" rx="10" fill="#fdf0f1" stroke="#E71B3D" stroke-width="1.6"/>
  <text class="zone" x="366" y="98">FLY.IO · SINGLE ALWAYS-ON PROCESS</text>

  <rect class="box" x="22" y="250" width="132" height="66" rx="7"/>
  <text class="bt" x="88" y="280" text-anchor="middle">Employee</text>
  <text class="bs" x="88" y="298" text-anchor="middle">Slack client</text>

  <rect class="box" x="180" y="250" width="140" height="66" rx="7"/>
  <text class="bt" x="250" y="280" text-anchor="middle">Slack</text>
  <text class="bs" x="250" y="298" text-anchor="middle">Socket Mode + chat</text>

  <rect class="box" x="22" y="470" width="150" height="58" rx="7"/>
  <text class="bt" x="97" y="494" text-anchor="middle">Fly secret store</text>
  <text class="bs" x="97" y="512" text-anchor="middle">API tokens → env</text>

  <rect class="box" x="366" y="110" width="312" height="56" rx="7"/>
  <text class="bt" x="378" y="132">app.py <tspan class="bs">· Slack Bolt</tspan></text>
  <text class="bs" x="378" y="150">events · per-thread state · slash commands</text>

  <rect class="box" x="366" y="184" width="312" height="62" rx="7"/>
  <text class="bt" x="378" y="206">IntakeAgent <tspan class="bs mono">(agent.py)</tspan></text>
  <text class="bs" x="378" y="223">Claude tool-use loop</text>
  <text class="bs" x="378" y="237">scripted fallback if model is down</text>

  <rect class="box" x="366" y="266" width="312" height="54" rx="7"/>
  <text class="bt" x="378" y="288">Router <tspan class="bs mono">(backends.py)</tspan></text>
  <text class="bs" x="378" y="306">team → backend · mints unique ticket IDs</text>

  <rect class="box" x="366" y="342" width="312" height="62" rx="7"/>
  <text class="bt" x="378" y="364">Backends · MirroredBackend</text>
  <text class="bs" x="378" y="381">one adapter per team: create / get</text>
  <text class="bs" x="378" y="395">+ mirror every write to the Sheet</text>

  <rect class="box" x="366" y="512" width="312" height="64" rx="7"/>
  <text class="bt" x="378" y="534">StatusWatcher <tspan class="bs mono">(status_watcher.py)</tspan></text>
  <text class="bs" x="378" y="551">background poller, every 8s</text>
  <text class="bs" x="378" y="565">on change: DM requester + sync Sheet</text>

  <text class="zone" x="744" y="120" fill="#5f5b5c">EXTERNAL SERVICES</text>
  <rect class="box" x="744" y="130" width="224" height="56" rx="7"/>
  <text class="bt" x="856" y="153" text-anchor="middle">Anthropic API</text>
  <text class="bs" x="856" y="171" text-anchor="middle">Claude Sonnet 4.6</text>

  <rect class="box" x="744" y="322" width="224" height="98" rx="7"/>
  <text class="bt" x="756" y="344">Team work tools</text>
  <text class="bs" x="756" y="364">Airtable · Legal</text>
  <text class="bs" x="756" y="381">Jira · IT</text>
  <text class="bs" x="756" y="398">Asana · Marketing</text>

  <rect class="box" x="744" y="470" width="224" height="72" rx="7" stroke="#E71B3D" stroke-width="1.8"/>
  <text class="bt" x="856" y="500" text-anchor="middle" fill="#E71B3D">Google Sheet</text>
  <text class="bs" x="856" y="518" text-anchor="middle">unified record (Sheets API)</text>

  <line x1="154" y1="283" x2="176" y2="283" stroke="#33302f" stroke-width="1.5" marker-end="url(#d)" marker-start="url(#ds)"/>
  <circle class="badge" cx="165" cy="266" r="8"/><text class="bnum" x="165" y="269.5" text-anchor="middle">1</text>

  <path d="M320,278 L366,150" stroke="#33302f" stroke-width="1.5" fill="none" marker-end="url(#d)" marker-start="url(#ds)"/>
  <circle class="badge" cx="345" cy="208" r="8"/><text class="bnum" x="345" y="211.5" text-anchor="middle">2</text>
  <text class="lbl" x="300" y="232">Socket Mode</text>

  <line x1="522" y1="166" x2="522" y2="182" stroke="#33302f" stroke-width="1.5" marker-end="url(#d)"/>
  <circle class="badge" cx="540" cy="174" r="8"/><text class="bnum" x="540" y="177.5" text-anchor="middle">3</text>

  <line x1="678" y1="215" x2="744" y2="158" stroke="#33302f" stroke-width="1.5" fill="none" marker-end="url(#d)" marker-start="url(#ds)"/>
  <circle class="badge" cx="724" cy="176" r="8"/><text class="bnum" x="724" y="179.5" text-anchor="middle">4</text>
  <text class="lbl" x="686" y="205">reason / tool calls</text>

  <line x1="522" y1="246" x2="522" y2="264" stroke="#33302f" stroke-width="1.5" marker-end="url(#d)"/>
  <circle class="badge" cx="540" cy="255" r="8"/><text class="bnum" x="540" y="258.5" text-anchor="middle">5</text>
  <text class="lbl" x="548" y="259">create_ticket</text>

  <line x1="522" y1="320" x2="522" y2="340" stroke="#33302f" stroke-width="1.5" marker-end="url(#d)"/>

  <line x1="678" y1="366" x2="744" y2="360" stroke="#33302f" stroke-width="1.5" marker-end="url(#d)" marker-start="url(#ds)"/>
  <circle class="badge" cx="712" cy="346" r="8"/><text class="bnum" x="712" y="349.5" text-anchor="middle">6</text>
  <text class="lbl" x="686" y="340">create / get</text>

  <path d="M678,392 L744,494" stroke="#33302f" stroke-width="1.5" fill="none" marker-end="url(#d)"/>
  <circle class="badge" cx="724" cy="446" r="8"/><text class="bnum" x="724" y="449.5" text-anchor="middle">7</text>
  <text class="lbl" x="688" y="462">mirror write</text>

  <text class="lbl" x="172" y="248" fill="#5f5b5c">replies &amp; status DMs flow back the same way</text>

  <path d="M522,512 L522,408" stroke="#E71B3D" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#r)"/>
  <text class="rlbl" x="528" y="470">poll get() · 8s</text>

  <path d="M678,548 L744,524" stroke="#E71B3D" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#r)"/>
  <text class="rlbl" x="686" y="548">sync status</text>

  <path d="M366,544 C300,544 300,300 322,300" stroke="#E71B3D" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#r)"/>
  <text class="rlbl" x="250" y="430" text-anchor="middle">status DM</text>

  <path d="M172,492 L348,470" stroke="#9a9594" stroke-width="1.4" stroke-dasharray="4 4" fill="none" marker-end="url(#g)"/>
  <text class="lbl" x="190" y="466" fill="#9a9594">tokens → env</text>

  <line x1="22" y1="632" x2="52" y2="632" stroke="#33302f" stroke-width="1.5"/>
  <text class="lbl" x="58" y="635">request &amp; ticket-creation flow</text>
  <line x1="250" y1="632" x2="280" y2="632" stroke="#E71B3D" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text class="rlbl" x="286" y="635">background status loop (every 8s)</text>
  <text class="lbl" x="22" y="656" fill="#5f5b5c">Each filed ticket is registered with the StatusWatcher, which then keeps the requester and the Sheet in sync.</text>
</svg>
